<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thuận AI</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#0b1020;color:#fff;min-height:100vh;display:grid;place-items:center;padding:24px}
.wrap{width:min(920px,100%)}h1{font-size:clamp(36px,7vw,72px);margin:0 0 12px}.sub{color:#b8c0d9;font-size:18px;margin-bottom:34px}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}.card{display:block;text-decoration:none;color:#fff;background:#151c31;border:1px solid #2b3554;border-radius:24px;padding:28px;transition:.2s}
.card:hover{transform:translateY(-3px);border-color:#6d8cff}.icon{font-size:38px}.card h2{font-size:26px;margin:18px 0 8px}.card p{color:#b8c0d9;line-height:1.55;margin:0}.badge{display:inline-block;margin-top:20px;background:#315efb;padding:9px 13px;border-radius:999px;font-weight:700}
.note{margin-top:24px;color:#8892ad;font-size:14px}@media(max-width:700px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class="wrap">
<h1>Thuận AI</h1>
<p class="sub">Một website, hai công cụ AI.</p>
<section class="grid">
<a class="card" href="/content"><div class="icon">✍️</div><h2>Xưởng Content</h2><p>Tạo caption, bài viết, kịch bản TikTok, email và nội dung marketing.</p><span class="badge">Mở công cụ</span></a>
<a class="card" href="/chat"><div class="icon">🌐</div><h2>Chat AI</h2><p>Trò chuyện với Claude bằng kiến thức có sẵn của mô hình.</p><span class="badge">Mở công cụ</span></a>
</section>
<p class="note">Chỉ cần cấu hình ANTHROPIC_API_KEY trên Vercel.</p>
</main>
</body>
</html>
